name: Weekly Channel Discovery

on:
  schedule:
    - cron: '0 10 * * 1'  # каждый понедельник в 10:00 UTC
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # нужно для git push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx

      - name: Run discovery
        env:
          ARENA_TOKEN: ${{ secrets.ARENA_TOKEN }}
          DEFAULT_SLUGS: ${{ secrets.DEFAULT_SLUGS }}
        run: python discover_channels.py

      - name: Commit discovered_channels.md
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add discovered_channels.md
          git diff --staged --quiet || git commit -m "chore: weekly channel discovery $(date +%Y-%m-%d)"
          git push
